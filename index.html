<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080d19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GrowthOS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>GrowthOS</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #080d19;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: 18px 16px 92px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.24), transparent 35%),
        radial-gradient(circle at top right, rgba(16,185,129,.18), transparent 34%),
        #080d19;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 12px 30px rgba(59,130,246,.3);
    }

    h1 {
      font-size: 20px;
      margin: 0;
      line-height: 1;
    }

    .sub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .btn {
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(148,163,184,.18);
      padding: 10px 12px;
    }

    .hero {
      background: #111c2f;
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.22);
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      font-size: 28px;
      margin: 0;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .score {
      text-align: right;
    }

    .score b {
      display: block;
      font-size: 34px;
      color: #10b981;
      line-height: 1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 16px;
      padding: 12px;
    }

    .stat b {
      display: block;
      font-size: 18px;
    }

    .coach {
      margin-top: 14px;
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.25);
      border-radius: 16px;
      padding: 12px;
      line-height: 1.6;
      font-size: 13px;
      color: #dbeafe;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 10px;
    }

    .head h3 {
      margin: 0;
      font-size: 18px;
    }

    .link {
      background: transparent;
      color: #3b82f6;
      font-size: 14px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .task,
    .card {
      background: #111c2f;
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .task {
      display: grid;
      grid-template-columns: 52px 1fr 38px;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 700;
    }

    .title {
      font-weight: 700;
    }

    .tag {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      color: #94a3b8;
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 99px;
      padding: 2px 7px;
    }

    .check {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(148,163,184,.18);
    }

    .done .title {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .done .check {
      background: rgba(16,185,129,.2);
      color: #10b981;
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
    }

    .barbox {
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #10b981);
    }

    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      background: rgba(8,13,25,.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(148,163,184,.18);
    }

    .tab {
      background: transparent;
      color: #94a3b8;
      border-radius: 14px;
      padding: 8px 2px;
      font-size: 11px;
    }

    .tab b {
      display: block;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .tab.active {
      background: rgba(59,130,246,.16);
      color: #ffffff;
    }

    .fab {
      position: fixed;
      right: 18px;
      bottom: 84px;
      width: 56px;
      height: 56px;
      border-radius: 20px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      font-size: 30px;
      box-shadow: 0 18px 40px rgba(59,130,246,.35);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      align-items: flex-end;
      z-index: 100;
    }

    .modal.show {
      display: flex;
    }

    .sheet {
      width: 100%;
      background: #0d1524;
      border-radius: 24px 24px 0 0;
      padding: 18px;
      border: 1px solid rgba(148,163,184,.18);
    }

    .sheet h3 {
      margin: 0 0 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      margin: 6px 0 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(255,255,255,.06);
      color: #ffffff;
      outline: none;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary {
      background: linear-gradient(135deg, #3b82f6, #10b981);
      padding: 13px;
      border-radius: 14px;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,.08);
      padding: 13px;
      border-radius: 14px;
    }

    @media (min-width: 720px) {
      .app,
      .tabs {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="brand">
        <div class="logo">G</div>
        <div>
          <h1>GrowthOS</h1>
          <div class="sub">你的 AI 人生操作系统</div>
        </div>
      </div>
      <button class="btn" onclick="resetData()">重置</button>
    </div>

    <div class="hero">
      <div class="hero-row">
        <div>
          <h2>今天</h2>
          <div class="muted" id="dateText">今日成长计划</div>
        </div>
        <div class="score">
          <b id="score">0</b>
          <span class="muted">成长值</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <b id="rate">0%</b>
          <span class="muted">完成率</span>
        </div>
        <div class="stat">
          <b id="streak">1天</b>
          <span class="muted">连续成长</span>
        </div>
        <div class="stat">
          <b id="knowledgeCount">0</b>
          <span class="muted">知识资产</span>
        </div>
      </div>

      <div class="coach" id="coach">AI 教练正在读取你的状态。</div>
    </div>

    <section class="screen active" id="today">
      <div class="head">
        <h3>今日任务</h3>
        <button class="link" onclick="openAdd()">添加任务</button>
      </div>
      <div id="tasks"></div>
    </section>

    <section class="screen" id="okr">
      <div class="head">
        <h3>人生 OKR</h3>
      </div>
      <div id="okrs"></div>
    </section>

    <section class="screen" id="project">
      <div class="head">
        <h3>项目中心</h3>
      </div>
      <div id="projects"></div>
    </section>

    <section class="screen" id="knowledge">
      <div class="head">
        <h3>AI 第二大脑</h3>
        <button class="link" onclick="addKnowledge()">添加知识</button>
      </div>
      <div id="knowledgeList"></div>
    </section>

    <section class="screen" id="review">
      <div class="head">
        <h3>AI 复盘</h3>
        <button class="link" onclick="renderReview()">生成复盘</button>
      </div>
      <div class="card" id="reviewText"></div>
    </section>
  </div>

  <button class="fab" onclick="openAdd()">+</button>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today', this)">
      <b>今</b>今天
    </button>
    <button class="tab" onclick="showTab('okr', this)">
      <b>标</b>OKR
    </button>
    <button class="tab" onclick="showTab('project', this)">
      <b>项</b>项目
    </button>
    <button class="tab" onclick="showTab('knowledge', this)">
      <b>知</b>知识
    </button>
    <button class="tab" onclick="showTab('review', this)">
      <b>复</b>复盘
    </button>
  </div>

  <div class="modal" id="modal">
    <div class="sheet">
      <h3>添加今日任务</h3>

      <label>时间</label>
      <input id="newTime" type="time" value="09:00">

      <label>任务名称</label>
      <input id="newTitle" placeholder="例如：阅读 30 分钟">

      <label>模块</label>
      <select id="newModule">
        <option>事业</option>
        <option>学习</option>
        <option>财富</option>
        <option>健康</option>
        <option>复盘</option>
      </select>

      <div class="row">
        <button class="secondary" onclick="closeAdd()">取消</button>
        <button class="primary" onclick="saveTask()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const KEY = 'growthos_simple_v1';

    let data = JSON.parse(localStorage.getItem(KEY) || 'null') || {
      score: 92,
      streak: 1,
      tasks: [
        { time: '07:00', title: '金融晨报', module: '财富', xp: 20, done: true },
        { time: '08:00', title: '公众号写作', module: '事业', xp: 35, done: false },
        { time: '12:30', title: '心理学学习', module: '学习', xp: 30, done: false },
        { time: '18:30', title: 'Jazz 练习', module: '健康', xp: 25, done: false },
        { time: '21:30', title: 'AI 晚间复盘', module: '复盘', xp: 20, done: false }
      ],
      okrs: [
        { title: '事业：稳定输出公众号内容', p: 38 },
        { title: '学习：系统学习心理学与 AI', p: 46 },
        { title: '健康：每周运动 4 次', p: 62 },
        { title: '财富：建立金融认知与副业收入', p: 28 }
      ],
      projects: [
        { title: '公众号运营', p: 42, note: '选题、写作、发布、复盘' },
        { title: '金融学习系统', p: 35, note: '晨报、知识卡片、底层逻辑' },
        { title: 'GrowthOS MVP', p: 18, note: 'Today、OKR、项目、复盘' }
      ],
      knowledge: [
        { title: '利率变化如何影响市场', cat: '金融' },
        { title: '习惯形成的触发机制', cat: '心理学' }
      ]
    };

    function save() {
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }

    function render() {
      const done = data.tasks.filter(function (t) {
        return t.done;
      }).length;

      const rate = data.tasks.length
        ? Math.round(done / data.tasks.length * 100)
        : 0;

      document.getElementById('dateText').textContent =
        new Date().toLocaleDateString('zh-CN', {
          month: 'long',
          day: 'numeric',
          weekday: 'long'
        });

      document.getElementById('score').textContent = data.score;
      document.getElementById('rate').textContent = rate + '%';
      document.getElementById('streak').textContent = data.streak + '天';
      document.getElementById('knowledgeCount').textContent = data.knowledge.length;

      document.getElementById('coach').textContent =
        rate >= 80
          ? '今天推进很好，晚上记得沉淀复盘。'
          : rate > 0
            ? '你已经开始行动了，继续完成一个小任务。'
            : '今天还没开始，先完成一件轻任务。';

      document.getElementById('tasks').innerHTML = data.tasks.map(function (t, i) {
        return `
          <div class="task ${t.done ? 'done' : ''}">
            <div class="time">${t.time}</div>
            <div>
              <div class="title">${esc(t.title)}</div>
              <span class="tag">${esc(t.module)} · +${t.xp}XP</span>
            </div>
            <button class="check" onclick="toggleTask(${i})">${t.done ? '✓' : ''}</button>
          </div>
        `;
      }).join('');

      document.getElementById('okrs').innerHTML = data.okrs.map(function (o) {
        return `
          <div class="card">
            <h4>${esc(o.title)}</h4>
            <div class="barbox">
              <div class="bar" style="width:${o.p}%"></div>
            </div>
            <p>当前推进 ${o.p}%</p>
          </div>
        `;
      }).join('');

      document.getElementById('projects').innerHTML = data.projects.map(function (p) {
        return `
          <div class="card">
            <h4>${esc(p.title)}</h4>
            <p>${esc(p.note)}</p>
            <div class="barbox">
              <div class="bar" style="width:${p.p}%"></div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('knowledgeList').innerHTML = data.knowledge.map(function (k) {
        return `
          <div class="card">
            <h4>${esc(k.title)}</h4>
            <p>${esc(k.cat)} · 已沉淀为知识资产</p>
          </div>
        `;
      }).join('');

      renderReview();
      save();
    }

    function toggleTask(i) {
      data.tasks[i].done = !data.tasks[i].done;
      data.score += data.tasks[i].done ? data.tasks[i].xp : -data.tasks[i].xp;
      render();
    }

    function showTab(id, btn) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });

      document.querySelectorAll('.tab').forEach(function (t) {
        t.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function openAdd() {
      document.getElementById('modal').classList.add('show');
    }

    function closeAdd() {
      document.getElementById('modal').classList.remove('show');
    }

    function saveTask() {
      const title = document.getElementById('newTitle').value.trim();

      if (!title) {
        alert('请填写任务名称');
        return;
      }

      data.tasks.push({
        time: document.getElementById('newTime').value || '09:00',
        title: title,
        module: document.getElementById('newModule').value,
        xp: 20,
        done: false
      });

      document.getElementById('newTitle').value = '';
      closeAdd();
      render();
    }

    function addKnowledge() {
      const title = prompt('请输入知识标题');

      if (!title) return;

      const cat = prompt('请输入分类，例如：金融 / AI / 心理学') || '未分类';

      data.knowledge.unshift({
        title: title,
        cat: cat
      });

      data.score += 10;
      render();
    }

    function renderReview() {
      const done = data.tasks
        .filter(function (t) {
          return t.done;
        })
        .map(function (t) {
          return t.title;
        })
        .join('、') || '还没有完成任务';

      const nextTask = data.tasks.find(function (t) {
        return !t.done;
      });

      const next = nextTask ? nextTask.title : '整理今日收获';

      document.getElementById('reviewText').innerHTML =
        '<p><b>今日最好：</b><br>' + esc(done) + '</p>' +
        '<p><b>AI 建议：</b><br>明天先完成「' + esc(next) + '」。优先做能沉淀为知识、作品或健康数据的事项。</p>' +
        '<p><b>长期资产：</b><br>你已经积累 ' + data.knowledge.length + ' 条知识资产。</p>';
    }

    function resetData() {
      if (confirm('确定重置本机数据吗？')) {
        localStorage.removeItem(KEY);
        location.reload();
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }

    render();
  </script>
</body>
</html>
